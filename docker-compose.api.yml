services:
  proteomes-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    extra_hosts:
      # Allows using DB_HOST=host.docker.internal when MySQL runs on the Docker host
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: "${DB_HOST}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"
      DATA_SOURCE: "${DATA_SOURCE:-proteomes_flat_mat}"
      VIEW_NAME: "${VIEW_NAME:-view_proteomes_flat_v2}"
    restart: unless-stopped
